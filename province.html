<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Province Details - Find Your Trip</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Detail View: Province Details -->
    <main id="detail-view" class="view active">
        <div class="detail-header" id="detail-header">
            <div class="hero-overlay"></div>
            <a href="index.html" class="back-btn" id="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
            <div class="detail-title-container">
                <h1 id="detail-province-name">Loading...</h1>
                <p>5 Famous Places to Visit</p>
            </div>
        </div>

        <section class="map-section">
            <div class="container">
                <h2 class="section-title">Location Map</h2>
                <div class="map-container" id="province-map-container">
                    <!-- Map iframe injected by JS -->
                </div>
            </div>
        </section>

        <section class="places-section">
            <div class="container">
                <div class="places-grid" id="places-grid">
                    <!-- Places injected by JS -->
                </div>
            </div>
        </section>

        <footer>
            <div class="container">
                <p> Find Your Trip discover Cambodia.</p>
            </div>
        </footer>
    </main>

    <!-- Load Data and Main Script -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
